<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page not found – TabFix</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0c0b10; color: #f5f3ee;
      min-height: 100vh; display: flex; flex-direction: column;
      align-items: center; justify-content: center; text-align: center;
      padding: 24px; -webkit-font-smoothing: antialiased;
    }
    .bolt {
      width: 72px; height: 72px; background: #5b3cf5; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; margin: 0 auto 28px; 
      box-shadow: 0 0 60px rgba(91,60,245,0.4);
    }
    .code { font-size: 100px; font-weight: 900; letter-spacing: -4px; color: #1e1b4b; line-height: 1; }
    h1 { font-size: 28px; font-weight: 800; letter-spacing: -0.5px; margin: 12px 0 10px; }
    p  { font-size: 15px; color: #71717a; line-height: 1.7; max-width: 360px; margin-bottom: 36px; }
    a.btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: #5b3cf5; color: #fff; padding: 12px 24px;
      border-radius: 10px; font-size: 14px; font-weight: 600;
      text-decoration: none; transition: opacity .15s;
    }
    a.btn:hover { opacity: 0.88; }
  </style>
</head>
<body>
  <div class="bolt">⚡</div>
  <div class="code">404</div>
  <h1>Page not found</h1>
  <p>This page doesn't exist — but TabFix can fill any form that does.</p>
  <a href="index.html" class="btn">← Back to TabFix</a>
</body>
</html>
